worker_processes auto;
events { worker_connections 1024; }

http {
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    upstream gov_api {
        server api:8000;
    }

    # Plain-HTTP listener exists only to redirect to HTTPS — TLS is required
    # for all real network transport.
    server {
        listen 80 default_server;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /run/runtime-secrets/tls_cert.pem;
        ssl_certificate_key /run/runtime-secrets/tls_key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384";
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS: require HTTPS for one year (operators may shorten while
        # debugging local-dev only).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        client_max_body_size 16m;

        location /healthz {
            access_log off;
            return 200 "ok\n";
        }

        location / {
            proxy_pass https://gov_api;
            proxy_ssl_verify on;
            proxy_ssl_trusted_certificate /run/runtime-secrets/tls_cert.pem;
            proxy_ssl_server_name on;
            proxy_ssl_name api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
